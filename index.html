<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workout Mode</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Dynamic exercise title -->
    <h1 id="exercise-title">Workout Mode</h1>

    <!-- Routine summary -->
    <div id="routine-text"></div>

    <!-- Current exercise -->
    <div id="exercise-name"></div>

    <!-- Timer -->
    <div id="time-display">00:00</div>

    <!-- Progress bar -->
    <div id="progress-container">
      <div id="progress"></div>
    </div>

    <!-- Buttons -->
    <button id="start-btn">Start Workout</button>
    <button id="music-btn">Music: OFF</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
